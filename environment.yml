name: diffuspec
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    - torch==2.6.0
    - torchvision
    - torchaudio
    - transformers>=4.47.0
    - accelerate>=0.34.0
    - tokenizers>=0.20.0
    - sentencepiece
    - numpy>=1.24.0
    - scipy
    - tqdm
    - datasets
    - huggingface-hub>=0.26.0
    - kenlm; sys_platform != 'win32'
    - nltk
    - evaluate
    - rouge-score
    - sacrebleu
    - pytest
    - pytest-cov
